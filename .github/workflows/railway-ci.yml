name: Railway CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: railway-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Build And Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npx nx build api

      - name: Lint API
        run: npx nx lint api

      - name: Build frontend
        run: npx nx build edunic-fe

      - name: Lint frontend
        run: npx nx lint edunic-fe
