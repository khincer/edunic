services:
  postgres:
    image: postgres:16
    container_name: edu_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edu_platform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d edu_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: edu_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.dockerfile
    container_name: edu_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/edu_platform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev:api"

  # worker:
  #   build:
  #     context: .
  #     dockerfile: docker/worker.Dockerfile
  #   container_name: edu_worker
  #   depends_on:
  #     - postgres
  #     - redis
  #   environment:
  #     NODE_ENV: development
  #     DATABASE_URL: postgres://postgres:postgres@postgres:5432/edu_platform
  #     REDIS_URL: redis://redis:6379
  #   volumes:
  #     - .:/app
  #     - /app/node_modules
  #   command: npm run dev:worker

volumes:
  postgres_data:
  api_node_modules:
