services:
  postgres:
    image: postgres:16
    container_name: edu_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edu_platform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: edu_redis
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: edu_api
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/edu_platform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev:api"

  # worker:
  #   build:
  #     context: .
  #     dockerfile: docker/worker.Dockerfile
  #   container_name: edu_worker
  #   depends_on:
  #     - postgres
  #     - redis
  #   environment:
  #     NODE_ENV: development
  #     DATABASE_URL: postgres://postgres:postgres@postgres:5432/edu_platform
  #     REDIS_URL: redis://redis:6379
  #   volumes:
  #     - .:/app
  #     - /app/node_modules
  #   command: npm run dev:worker

volumes:
  postgres_data:
  api_node_modules:
